name: Fetch Trinity Fixtures & Ladder

on:
  # ── Scheduled runs ───────────────────────────────────────────
  schedule:
    # Every 2 minutes on Saturdays 7:50am–6:10pm AEST (= Friday 21:50–Saturday 08:10 UTC)
    # GitHub cron uses UTC. AEST = UTC+10.
    - cron: '*/5 21 * * 5'   # Fri 21:50–21:59 UTC = Sat 7:50–7:59am AEST
    - cron: '*/5 22-23 * * 5'  # Fri 22:00–23:59 UTC = Sat 8:00–9:59am AEST
    - cron: '*/5 0-7 * * 6'    # Sat 00:00–07:59 UTC = Sat 10:00am–5:59pm AEST
    - cron: '*/5 8 * * 6'     # Sat 08:00–08:10 UTC = Sat 6:00–6:10pm AEST

    # Every 6 hours all other times (keeps fixtures/schedule up to date)
    - cron: '0 */6 * * *'

  # ── Manual trigger from GitHub UI or API ─────────────────────
  workflow_dispatch:
    inputs:
      target:
        description: 'What to fetch'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - fixtures
          - ladder

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit data files back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd scripts
          npm ci

      - name: Fetch fixtures
        if: ${{ github.event.inputs.target != 'ladder' }}
        env:
          SQUADI_API_KEY: ${{ secrets.SQUADI_API_KEY }}
        run: node scripts/fetch-fixtures.js

      - name: Fetch ladder
        if: ${{ github.event.inputs.target != 'fixtures' }}
        env:
          SQUADI_API_KEY: ${{ secrets.SQUADI_API_KEY }}
        run: node scripts/fetch-ladder.js

      - name: Commit & push data files
        run: |
          git config user.name  "Trinity Netball Bot"
          git config user.email "bot@trinitynetball.com.au"
          git add public/fixtures.json public/ladder.json
          # Only commit if something actually changed
          git diff --staged --quiet || git commit -m "chore: update fixtures & ladder [skip ci]"
          git push
