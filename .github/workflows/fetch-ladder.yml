name: Fetch Trinity Ladders


on:
  # ── Scheduled runs ───────────────────────────────────────────
  schedule:    
    - cron: '1 */12 * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: scripts
        run: npm install

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('scripts/package-lock.json') }}

      - name: Install Playwright browser
        run: |
          cd scripts
          npx playwright install chromium

      - name: Scrape ladder
        run: node scripts/scrape-ladder.js

      - name: Commit updated JSON
        run: |
          git config user.name "Trinity Netball Bot"
          git config user.email "registrations@trinitynetball.com.au"

          git add public/*.json

          if ! git diff --staged --quiet; then
            git commit -m "Update ladder"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Upload JSON artifacts
        uses: actions/upload-artifact@v4
        with:
          name: netball-data
          path: |
            public/ladder.json