<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trinity Netball 2026</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pu:#5B2D8E;--pu2:#7B4DB5;--pu3:#EEE6FA;
  --go:#C9960E;--gob:#FFF8E1;
  --tx:#1a1a1a;--tm:#555;--tf:#aaa;
  --bd:#E4E4E8;--cb:#fff;--pb:#F7F5FC;
  --wbg:#E8F5EE;--wtx:#1B6B35;
  --lbg:#FDECEA;--ltx:#B71C1C;
  --dbg:#FFF8E1;--dtx:#7B5800;
  --ubg:#EBF0FF;--utx:#1A3FA8;
  --livebg:#FFF5F5;--livebrd:#FFCCCC;
  --r:14px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--pb);color:var(--tx);min-height:100vh}

/* HEADER */
header{background:linear-gradient(135deg,#3D1A6E 0%,#5B2D8E 60%,#7B4DB5 100%);padding:1.75rem 1.25rem 0;text-align:center;position:relative;overflow:hidden}
header::before{content:'';position:absolute;top:-50px;right:-50px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.06)}
header::after{content:'';position:absolute;bottom:-70px;left:-30px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.04)}
.eyebrow{display:inline-block;background:var(--gob);color:var(--go);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 13px;border-radius:20px;margin-bottom:.6rem;position:relative;z-index:1}
header h1{font-size:clamp(1.6rem,5vw,2.4rem);font-weight:800;color:#fff;letter-spacing:-.02em;position:relative;z-index:1}
header p{color:rgba(255,255,255,.6);font-size:.875rem;margin-top:.2rem;position:relative;z-index:1}
.stats{display:flex;justify-content:center;gap:.65rem;margin-top:1rem;position:relative;z-index:1;flex-wrap:wrap}
.sc{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:.4rem .85rem;text-align:center;color:#fff;min-width:58px}
.sc .n{font-size:1.25rem;font-weight:700;display:block;line-height:1}
.sc .l{font-size:10px;text-transform:uppercase;letter-spacing:.07em;opacity:.65;margin-top:2px;display:block}
.tabs-bar{display:flex;position:relative;z-index:1;margin-top:1.1rem}
.tab{flex:1;padding:.7rem .5rem;font-size:14px;font-weight:600;color:rgba(255,255,255,.5);background:transparent;border:none;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s}
.tab.active{color:#fff;border-bottom-color:#fff}
.tab:hover:not(.active){color:rgba(255,255,255,.75)}

/* PANELS */
.panel{display:none}.panel.active{display:block}

/* STATUS BAR */
.status-bar{background:#fff;border-bottom:1px solid var(--bd);padding:.45rem 1.25rem;font-size:11px;color:var(--tf);display:flex;justify-content:space-between;align-items:center;gap:.5rem;flex-wrap:wrap}
.status-bar .proxy-url{color:var(--pu);font-weight:500;font-size:11px}
.refresh-btn{background:var(--pu3);color:var(--pu);border:none;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;cursor:pointer}
.refresh-btn:hover{background:var(--pu);color:#fff}

/* FILTERS */
.filters-wrap{background:#fff;border-bottom:1px solid var(--bd);padding:.6rem 1rem;position:sticky;top:0;z-index:10}
.frow{display:flex;gap:.3rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:1px;max-width:860px;margin:0 auto}
.frow::-webkit-scrollbar{display:none}
.frow+.frow{margin-top:.3rem}
.fbtn{flex-shrink:0;border:1px solid var(--bd);background:var(--pb);color:var(--tm);padding:5px 12px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.fbtn:hover{border-color:var(--pu2);color:var(--pu)}
.fbtn.active{background:var(--pu);border-color:var(--pu);color:#fff;font-weight:600}
.tbtn{flex-shrink:0;border:1px solid var(--bd);background:var(--pb);color:var(--tm);padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.tbtn:hover{border-color:var(--pu2);color:var(--pu)}
.tbtn.active{background:var(--pu3);border-color:var(--pu2);color:var(--pu);font-weight:600}

/* TODAY INTRO */
.today-intro{background:#fff;border-bottom:1px solid var(--bd);padding:.7rem 1.25rem}
.today-meta{max-width:860px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem}
.today-left .date{font-size:13px;font-weight:700;color:var(--pu)}
.today-left .venue{font-size:12px;color:var(--tf);margin-top:1px}
.today-chips{display:flex;gap:.4rem;flex-wrap:wrap}
.chip{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap}
.chip-live{background:#CC0000;color:#fff;animation:pulse 1.5s infinite}
.chip-win{background:var(--wbg);color:var(--wtx)}
.chip-loss{background:var(--lbg);color:var(--ltx)}
.chip-rem{background:var(--ubg);color:var(--utx)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}

/* MAIN */
main{max-width:860px;margin:0 auto;padding:1rem 1rem 3rem}
.rcnt{font-size:12px;color:var(--tf);text-align:right;margin-bottom:.6rem}
.dsec{margin-bottom:1.5rem}
.dhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
.dlbl{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--pu)}
.dcnt{font-size:12px;color:var(--tf)}

/* CARD */
.card{background:var(--cb);border:1px solid var(--bd);border-radius:var(--r);padding:.85rem 1.05rem;margin-bottom:.5rem;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:border-color .15s,box-shadow .15s}
.card:hover{border-color:var(--pu2);box-shadow:0 4px 12px rgba(91,45,142,.1)}
.card.hidden{display:none}
.card-live{border-color:var(--livebrd)!important;background:var(--livebg)!important;box-shadow:0 0 0 2px rgba(204,0,0,.08)}

.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.65rem}
.cleft{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;min-width:0}
.dtag{font-size:11px;font-weight:600;background:var(--pu3);color:var(--pu);padding:2px 7px;border-radius:5px;white-space:nowrap;max-width:220px;overflow:hidden;text-overflow:ellipsis}
.rlbl{font-size:11px;color:var(--tf);font-weight:500}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.b-live{background:#CC0000;color:#fff;animation:pulse 1.5s infinite}
.b-win{background:var(--wbg);color:var(--wtx)}
.b-loss{background:var(--lbg);color:var(--ltx)}
.b-draw{background:var(--dbg);color:var(--dtx)}
.b-up{background:var(--ubg);color:var(--utx)}

/* MATCHUP */
.matchup{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:.5rem}
.team-block{display:flex;flex-direction:column;gap:3px}
.team-block-right{align-items:flex-end;text-align:right}
.team{font-size:14px;font-weight:600;color:var(--tm);line-height:1.3}
.tt{color:var(--pu);font-weight:700}

/* RANK BADGES */
.rank-badge{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;letter-spacing:.02em;white-space:nowrap}
.rk-1{background:#FFF3CC;color:#7a5500;border:1px solid #F5C842}
.rk-2{background:#F2F2F2;color:#555;border:1px solid #ccc}
.rk-3{background:#FFF0E6;color:#7a3a00;border:1px solid #E09050}
.rk-top{background:#EEF6FF;color:#1a5fa8;border:1px solid #B0CCEE}
.rk-low{background:#F5F5F5;color:#888;border:1px solid #ddd}

.score{font-size:1.45rem;font-weight:800;color:var(--tx);text-align:center;white-space:nowrap;display:flex;align-items:center;justify-content:center;gap:3px}
.score-live{color:#CC0000}
.dash{color:var(--tf);font-weight:300;font-size:1.1rem}
.vs{font-size:12px;font-weight:600;color:var(--tf);text-align:center;letter-spacing:.04em}
.ldot{display:inline-block;width:7px;height:7px;background:#CC0000;border-radius:50%;flex-shrink:0;animation:ldotPulse 1s infinite}
@keyframes ldotPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.6}}
.cfoot{margin-top:.6rem;display:flex;gap:.65rem;flex-wrap:wrap;font-size:12px;color:var(--tf)}
.empty{text-align:center;padding:2.5rem 1rem;background:var(--cb);border:1px dashed var(--bd);border-radius:var(--r);color:var(--tm);font-size:14px}

/* PROXY SETUP NOTICE */
.setup-notice{background:#FFF8E1;border:1px solid #F5C842;border-radius:var(--r);padding:1rem 1.1rem;margin-bottom:1rem;font-size:13px}
.setup-notice strong{color:#7a5500;display:block;margin-bottom:.3rem}
.setup-notice code{background:rgba(0,0,0,.07);padding:1px 5px;border-radius:4px;font-size:12px;word-break:break-all}

@media(max-width:480px){
  .team{font-size:12px}.score{font-size:1.2rem}
  header{padding:1.4rem 1rem 0}.dtag{max-width:150px}
  .rank-badge{font-size:9px;padding:1px 5px}
}
</style>
</head>

// ── State ─────────────────────────────────────────────────────────────────
let allMatches = [];
let ladderMap  = {};   // teamId -> {rank, totalTeams, pts, w, l}
let allTeams   = [];
let todayResultFilter = 'all';
let todayTeamFilter   = 'all';
let schedResultFilter = 'all';
let schedTeamFilter   = 'all';
let refreshTimer      = null;

// ── Boot ─────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  buildTeamFilters(BAKED_TEAMS);
  renderFromData(BAKED_MATCHES, {});
  if (PROXY_URL) {
    refresh();
    // Auto-refresh every 60s while page is open
    refreshTimer = setInterval(refresh, 60_000);
  } else {
    setStatus('⚠️ Using cached data — set PROXY_URL in the HTML to get live scores & ladder', false);
    showSetupNotice();
  }
});

// ── Data fetching ────────────────────────────────────────────────────────
async function refresh() {
  setStatus('Fetching live data…', true);
  try {
    const [fixtureData, ladderData] = await Promise.all([
      fetchJSON(`${PROXY_URL}/fixtures`),
      fetchJSON(`${PROXY_URL}/ladder`),
    ]);

    // Parse fixtures from proxy format (rounds[] with matches[])
    const matches = [];
    for (const round of (fixtureData.rounds || [])) {
      for (const m of (round.matches || [])) {
        matches.push(enrichMatch(m, round));
      }
    }

    // Build ladder map: teamId -> rank info
    const lmap = {};
    for (const [teamId, entry] of Object.entries(ladderData.ladder || {})) {
      lmap[parseInt(teamId)] = entry;
    }

    allMatches = matches.sort(sortMatchKey);
    ladderMap  = lmap;
    allTeams   = [...new Set(matches.map(m => isTrinity(m.team1) ? m.team1 : m.team2))].sort();

    buildTeamFilters(allTeams);
    renderFromData(allMatches, ladderMap);

    const ago = fixtureData.stale ? ' (stale)' : '';
    setStatus(`Live data — updated ${new Date().toLocaleTimeString('en-AU')}${ago}`, false);
  } catch (err) {
    console.error('Refresh error:', err);
    setStatus(`⚠️ Live fetch failed — showing cached data (${err.message})`, false);
  }
}

async function fetchJSON(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`${res.status} from ${url}`);
  return res.json();
}

// ── Data helpers ──────────────────────────────────────────────────────────
function isTrinity(name) {
  return typeof name === 'string' && name.toLowerCase().includes('trinity');
}

function enrichMatch(m, round) {
  // Works with both baked data format and live proxy format
  const startISO = m.start || m.startTime || '';
  const dt = startISO ? new Date(startISO) : null;
  const aest = dt ? new Date(dt.getTime() + 10 * 3600_000) : null;
  const dateStr = aest ? aest.toLocaleDateString('en-AU', {weekday:'short',day:'numeric',month:'short',year:'numeric'}) : '';
  const timeStr = aest ? aest.toLocaleTimeString('en-AU', {hour:'numeric',minute:'2-digit',hour12:true}) : '';

  const t1 = m.team1?.name || m.team1 || '';
  const t2 = m.team2?.name || m.team2 || '';
  const t1Id = m.team1?.id || m.team1Id || null;
  const t2Id = m.team2?.id || m.team2Id || null;
  const status = m.matchStatus || '';
  const t1s = m.team1Score ?? 0;
  const t2s = m.team2Score ?? 0;
  const t1Trinity = isTrinity(t1);

  let result;
  if (status === 'STARTED') result = 'LIVE';
  else if (status === 'ENDED') {
    const ts = t1Trinity ? t1s : t2s;
    const os = t1Trinity ? t2s : t1s;
    result = ts > os ? 'WIN' : ts < os ? 'LOSS' : 'DRAW';
  } else result = 'UPCOMING';

  // Div short name
  const divName = m.division || round?.division?.name || m.divisionName || '';
  const divShort = divName
    .replace(/\(Femals and Males\)|\(Females & Males\)/g, '')
    .replace(/\(Males 13\/U.*?participate\)/g, '')
    .replace(/restrictions apply|- no restrictions/g, '')
    .replace(/\s+/g, ' ').trim();

  return {
    id: m.id,
    round: round?.name || m.round || '',
    round_seq: round?.sequence ?? 0,
    division: divName,
    div_short: divShort,
    start: startISO,
    date_str: dateStr,
    time_str: timeStr,
    team1: t1, team2: t2,
    team1Id: t1Id, team2Id: t2Id,
    team1Score: t1s, team2Score: t2s,
    matchStatus: status,
    result,
    venue: m.venueCourt?.venue?.name || m.venue || '',
    court: m.venueCourt?.name || m.court || '',
  };
}

function sortMatchKey(m) {
  const order = {LIVE:0,WIN:1,LOSS:1,DRAW:1,UPCOMING:2};
  return [order[m.result]??2, m.start].join('|');
}

// ── Rendering ─────────────────────────────────────────────────────────────
function renderFromData(matches, lmap) {
  const today = matches.filter(m => m.date_str === TODAY_DATE);
  const todayLive     = today.filter(m => m.result === 'LIVE').length;
  const todayWins     = today.filter(m => m.result === 'WIN').length;
  const todayLosses   = today.filter(m => m.result === 'LOSS').length;
  const todayUpcoming = today.filter(m => m.result === 'UPCOMING').length;

  // Header stats
  document.getElementById('stat-live').textContent     = todayLive;
  document.getElementById('stat-played').textContent   = todayWins + todayLosses;
  document.getElementById('stat-upcoming').textContent = todayUpcoming;

  // Today chips
  const chips = document.getElementById('today-chips');
  chips.innerHTML = [
    todayLive     ? `<span class="chip chip-live">● ${todayLive} Live</span>` : '',
    `<span class="chip chip-win">${todayWins} Win${todayWins!==1?'s':''}</span>`,
    `<span class="chip chip-loss">${todayLosses} Loss${todayLosses!==1?'es':''}</span>`,
    `<span class="chip chip-rem">${todayUpcoming} Upcoming</span>`,
  ].join('');

  // Today cards
  const todaySorted = [...today].sort((a,b) => sortMatchKey(a).localeCompare(sortMatchKey(b)));
  document.getElementById('today-cards').innerHTML = todaySorted.map(m => makeCard(m, lmap)).join('');

  // Schedule sections
  let schedHtml = '';
  for (const date of DATE_ORDER) {
    const day = matches.filter(m => m.date_str === date).sort((a,b) => a.start.localeCompare(b.start));
    if (!day.length) continue;
    const isToday = date === TODAY_DATE;
    schedHtml += `<section class="dsec" data-date="${esc(date)}">
      <div class="dhead">
        <span class="dlbl">${isToday ? '🔴 Today — ' : ''}${esc(date)}</span>
        <span class="dcnt">${day.length} matches</span>
      </div>
      ${day.map(m => makeCard(m, lmap)).join('')}
    </section>`;
  }
  document.getElementById('sched-list').innerHTML = schedHtml;

  applyTodayFilter();
  applySchedFilter();
}

function makeCard(m, lmap) {
  const t1t = isTrinity(m.team1);
  const t2t = isTrinity(m.team2);
  const isLive = m.result === 'LIVE';
  const isDone = ['WIN','LOSS','DRAW'].includes(m.result);
  const hasScore = (isLive || isDone) && (m.team1Score || m.team2Score || isDone);

  const scoreHtml = hasScore
    ? `<div class="score ${isLive?'score-live':''}">
         ${isLive ? '<span class="ldot"></span>' : ''}
         <span>${m.team1Score}</span><span class="dash">–</span><span>${m.team2Score}</span>
       </div>`
    : '<div class="vs">vs</div>';

  const badgeMap = {LIVE:'b-live ● LIVE',WIN:'b-win Win',LOSS:'b-loss Loss',DRAW:'b-draw Draw',UPCOMING:'b-up Upcoming'};
  const [bcls, ...bwords] = (badgeMap[m.result]||'b-up Upcoming').split(' ');
  const blbl = bwords.join(' ');

  const teamKey = esc(t1t ? m.team1 : m.team2);

  const t1Rank = rankBadge(m.team1Id, lmap);
  const t2Rank = rankBadge(m.team2Id, lmap);

  return `<div class="card ${isLive?'card-live':''}" data-team="${teamKey}" data-result="${m.result}" data-round="${esc(m.round)}">
    <div class="card-top">
      <div class="cleft"><span class="dtag">${esc(m.div_short)}</span><span class="rlbl">${esc(m.round)}</span></div>
      <span class="badge ${bcls}">${blbl}</span>
    </div>
    <div class="matchup">
      <div class="team-block">
        <div class="team ${t1t?'tt':''}">${esc(m.team1)}</div>
        ${t1Rank}
      </div>
      ${scoreHtml}
      <div class="team-block team-block-right">
        <div class="team ${t2t?'tt':''}">${esc(m.team2)}</div>
        ${t2Rank}
      </div>
    </div>
    <div class="cfoot"><span>🕐 ${esc(m.time_str)}</span><span>📍 ${esc(m.venue)}, ${esc(m.court)}</span></div>
  </div>`;
}

function rankBadge(teamId, lmap) {
  if (!teamId || !lmap[teamId]) return '';
  const {rank, totalTeams, wins, losses, points} = lmap[teamId];
  const n = parseInt(rank);
  const sfx = [11,12,13].includes(n%100) ? 'th' : ({1:'st',2:'nd',3:'rd'}[n%10]||'th');
  const label = `${n}${sfx} of ${totalTeams}`;
  const cls = n===1?'rk-1':n===2?'rk-2':n===3?'rk-3':n<=Math.ceil(totalTeams/2)?'rk-top':'rk-low';
  return `<span class="rank-badge ${cls}" title="${wins}W ${losses}L ${points}pts">${label}</span>`;
}

// ── Filter helpers ────────────────────────────────────────────────────────
function applyTodayFilter() {
  let v = 0;
  document.querySelectorAll('#today-cards .card').forEach(c => {
    const ok = (todayResultFilter==='all'||c.dataset.result===todayResultFilter)
            && (todayTeamFilter==='all'||c.dataset.team===todayTeamFilter);
    c.classList.toggle('hidden', !ok);
    if (ok) v++;
  });
  document.getElementById('today-count').textContent = `Showing ${v} match${v!==1?'es':''}`;
  document.getElementById('today-empty').classList.toggle('hidden', v>0);
}

function applySchedFilter() {
  let v = 0;
  document.querySelectorAll('#sched-list .card').forEach(c => {
    const ok = (schedResultFilter==='all'||c.dataset.result===schedResultFilter||c.dataset.round===schedResultFilter)
            && (schedTeamFilter==='all'||c.dataset.team===schedTeamFilter);
    c.classList.toggle('hidden', !ok);
    if (ok) v++;
  });
  document.querySelectorAll('#sched-list .dsec').forEach(s => {
    s.style.display = s.querySelectorAll('.card:not(.hidden)').length ? '' : 'none';
  });
  document.getElementById('sched-count').textContent = `Showing ${v} match${v!==1?'es':''}`;
  document.getElementById('sched-empty').classList.toggle('hidden', v>0);
}

function buildTeamFilters(teams) {
  const todayContainer = document.getElementById('today-team-btns');
  const schedContainer = document.getElementById('sched-team-btns');
  const makeBtn = (t, suffix) => {
    const short = t === 'all' ? 'All teams' : t.replace('Trinity ', '');
    return `<button class="tbtn tt-${suffix}${t==='all'?' active':''}" data-team="${esc(t)}">${esc(short)}</button>`;
  };
  todayContainer.innerHTML = ['all',...teams].map(t => makeBtn(t,'today')).join('');
  schedContainer.innerHTML = ['all',...teams].map(t => makeBtn(t,'sched')).join('');
  bindTeamBtns();
}

function bindTeamBtns() {
  document.querySelectorAll('.tt-today').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('.tt-today').forEach(x => x.classList.remove('active'));
    b.classList.add('active'); todayTeamFilter = b.dataset.team; applyTodayFilter();
  }));
  document.querySelectorAll('.tt-sched').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('.tt-sched').forEach(x => x.classList.remove('active'));
    b.classList.add('active'); schedTeamFilter = b.dataset.team; applySchedFilter();
  }));
}

// ── Tab switching ─────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  document.getElementById('panel-' + t.dataset.tab).classList.add('active');
}));

// ── Result filter buttons ─────────────────────────────────────────────────
document.querySelectorAll('.tf-btn').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.tf-btn').forEach(x => x.classList.remove('active'));
  b.classList.add('active'); todayResultFilter = b.dataset.tfilter; applyTodayFilter();
}));
document.querySelectorAll('.sf-btn').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.sf-btn').forEach(x => x.classList.remove('active'));
  b.classList.add('active'); schedResultFilter = b.dataset.sfilter; applySchedFilter();
}));

// ── Misc ──────────────────────────────────────────────────────────────────
function setStatus(msg, loading) {
  document.getElementById('status-text').textContent = msg;
}

function showSetupNotice() {
  const notice = document.createElement('div');
  notice.className = 'setup-notice';
  notice.innerHTML = `<strong>⚙️ To enable live scores & ladder positions:</strong>
    1. Deploy the proxy to Cloud Run (see <code>deploy.sh</code>)<br>
    2. Paste your Cloud Run URL into <code>const PROXY_URL = '...'</code> at the top of this file`;
  document.querySelector('#panel-today main').prepend(notice);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// On page load, enrich the baked-in data so it renders correctly
allMatches = BAKED_MATCHES;  // already enriched from build time
allTeams   = BAKED_TEAMS;
</script>
</body>
</html>
