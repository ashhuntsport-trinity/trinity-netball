<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixtures & Results – Trinity Netball Club</title>
<link rel="icon" href="https://trinitynetball.com.au/wp-content/uploads/2022/11/cropped-cropped-cropped-trinity-1-1-270x270.png">
<style>
/* ── Trinity Netball Club — brand palette from trinitynetball.com.au ──
   Primary:   #c7aadf  (purple / lilac)
   Secondary: #9B6BC8  (mid lilac)
   Accent:    #C8A8E8  (light lilac)
   Dark:      #2D1A4A  (deep purple)
   White:     #FFFFFF
   Page bg:   #F8F5FC
   Text:      #2D2D2D
   Muted:     #6B6B6B
   Font:      same stack as site (system sans)
─────────────────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pu:    #c7aadf;
  --pu2:   #9B6BC8;
  --pu3:   #EDE5F8;
  --pu4:   #F5F0FC;
  --dark:  #2D1A4A;
  --white: #ffffff;
  --pb:    #F8F5FC;
  --tx:    #2D2D2D;
  --tm:    #555;
  --tf:    #999;
  --bd:    #E2D9F3;
  --cb:    #ffffff;
  --wbg:#E8F5EE;--wtx:#1B6B35;
  --lbg:#FDECEA;--ltx:#B71C1C;
  --dbg:#FFF8E1;--dtx:#7B5800;
  --ubg:#EDE5F8;--utx:#6B3FA0;
  --livebg:#FFF5F5;--livebrd:#FFBBBB;
  --r:10px;
  --shadow: 0 1px 4px rgba(107,63,160,.10);
}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  background:var(--pb);
  color:var(--tx);
  min-height:100vh;
  font-size:15px;
}

/* ── SITE HEADER (matches Trinity website nav style) ── */
.site-header{
  background:var(--dark);
  padding:.65rem 1.25rem;
  display:flex;
  align-items:center;
  gap:.75rem;
}
.site-header img{height:36px;width:auto}
.site-header-title{
  color:rgba(255,255,255,.85);
  font-size:13px;
  font-weight:500;
  letter-spacing:.02em;
}
.site-header a{
  color:rgba(255,255,255,.5);
  text-decoration:none;
  font-size:12px;
  margin-left:auto;
}
.site-header a:hover{color:#fff}

/* ── PAGE HEADER ── */
.page-header{
  background:var(--pu);
  padding:1.5rem 1.25rem 0;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.page-header::after{
  content:'';position:absolute;
  bottom:-1px;left:0;right:0;
  height:20px;background:var(--pb);
  clip-path:ellipse(55% 100% at 50% 100%);
}
.page-header h1{
  font-size:clamp(1.4rem,4vw,2rem);
  font-weight:700;
  color:var(--white);
  letter-spacing:-.01em;
  position:relative;z-index:1;
}
.page-header p{
  color:rgba(255,255,255,.7);
  font-size:.85rem;
  margin-top:.25rem;
  position:relative;z-index:1;
}

/* ── STATS ROW ── */
.stats{
  display:flex;justify-content:center;gap:.6rem;
  margin-top:1rem;padding-bottom:1.4rem;
  position:relative;z-index:1;flex-wrap:wrap;
}
.sc{
  background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.25);
  border-radius:8px;padding:.35rem .8rem;
  text-align:center;color:#fff;min-width:56px;
}
.sc .n{font-size:1.15rem;font-weight:700;display:block;line-height:1}
.sc .l{font-size:9px;text-transform:uppercase;letter-spacing:.08em;opacity:.7;margin-top:1px;display:block}

/* ── TABS ── */
.tabs-bar{
  display:flex;
  background:var(--dark);
  position:relative;z-index:1;
}
.tab{
  flex:1;padding:.65rem .5rem;
  font-size:13px;font-weight:600;
  color:rgba(255,255,255,.45);
  background:transparent;border:none;cursor:pointer;
  border-bottom:3px solid transparent;
  transition:all .18s;letter-spacing:.01em;
}
.tab.active{color:#fff;border-bottom-color:var(--pu2)}
.tab:hover:not(.active){color:rgba(255,255,255,.75)}

/* ── PANELS ── */
.panel{display:none}.panel.active{display:block}

/* ── STATUS BAR ── */
.status-bar{
  background:var(--pu4);
  border-bottom:1px solid var(--bd);
  padding:.4rem 1.25rem;
  font-size:11px;color:var(--tf);
  display:flex;justify-content:space-between;align-items:center;gap:.5rem;
  flex-wrap:wrap;
}
.status-bar span{display:flex;align-items:center;gap:.4rem}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--tf);display:inline-block}
.status-dot.live{background:#22c55e;animation:sdPulse 1.5s infinite}
@keyframes sdPulse{0%,100%{opacity:1}50%{opacity:.4}}

.inv-btn{
  background:transparent;
  color:var(--pu);
  border:1px solid var(--bd);
  padding:2px 10px;border-radius:20px;
  font-size:11px;font-weight:600;cursor:pointer;
  transition:all .15s;white-space:nowrap;
}
.inv-btn:hover{background:var(--pu);color:#fff;border-color:var(--pu)}
.refresh-btn{
  padding:6px 18px;
  font-size:13px;
  font-weight:700;
  border-width:1.5px;
}
.last-updated{color:var(--tf);font-size:11px}

/* ── TODAY INTRO ── */
.today-intro{
  background:var(--white);
  border-bottom:1px solid var(--bd);
  padding:.65rem 1.25rem;
}
.today-meta{
  max-width:860px;margin:0 auto;
  display:flex;justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:.5rem;
}
.today-left .date{font-size:13px;font-weight:700;color:var(--pu)}
.today-chips{display:flex;gap:.35rem;flex-wrap:wrap}
.chip{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600;white-space:nowrap}
.chip-live{background:#DC2626;color:#fff;animation:pulse 1.5s infinite}
.chip-win{background:var(--wbg);color:var(--wtx)}
.chip-loss{background:var(--lbg);color:var(--ltx)}
.chip-rem{background:var(--ubg);color:var(--utx)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.65}}

/* ── FILTERS ── */
.filters-wrap{
  background:var(--white);
  border-bottom:1px solid var(--bd);
  padding:.55rem 1rem;
  position:sticky;top:0;z-index:10;
}
.frow{
  display:flex;gap:.3rem;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;padding-bottom:1px;
  max-width:860px;margin:0 auto;
}
.frow::-webkit-scrollbar{display:none}
.frow+.frow{margin-top:.3rem}
.fbtn{
  flex-shrink:0;
  border:1px solid var(--bd);background:var(--pb);
  color:var(--tm);padding:4px 12px;
  border-radius:20px;font-size:12px;font-weight:500;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.fbtn:hover{border-color:var(--pu2);color:var(--pu)}
.fbtn.active{background:var(--pu);border-color:var(--pu);color:#fff;font-weight:600}
.tbtn{
  flex-shrink:0;
  border:1px solid var(--bd);background:var(--pb);
  color:var(--tm);padding:3px 10px;
  border-radius:20px;font-size:12px;font-weight:500;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.tbtn:hover{border-color:var(--pu2);color:var(--pu)}
.tbtn.active{background:var(--pu3);border-color:var(--pu2);color:var(--pu);font-weight:600}

/* ── MAIN ── */
main{max-width:860px;margin:0 auto;padding:.9rem 1rem 3rem}
.rcnt{font-size:11px;color:var(--tf);text-align:right;margin-bottom:.55rem}

.dsec{margin-bottom:1.4rem}
.dhead{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:.45rem;
  padding-bottom:.4rem;
  border-bottom:2px solid var(--pu3);
}
.dlbl{
  font-size:11px;font-weight:700;
  letter-spacing:.07em;text-transform:uppercase;
  color:var(--pu);
}
.dcnt{font-size:11px;color:var(--tf)}

/* ── AGE GROUP SECTIONS ── */
.agegrp{margin-bottom:.3rem}
.agegrp.hidden{display:none}
.agehead{
  display:flex;justify-content:space-between;align-items:center;
  margin:.7rem 0 .4rem;
  padding:.3rem .65rem;
  background:var(--pu4);
  border-left:3px solid var(--pu2);
  border-radius:6px;
}
.agehead .albl{
  font-size:11px;font-weight:700;
  letter-spacing:.05em;text-transform:uppercase;
  color:var(--pu);
}
.agehead .acnt{font-size:10px;color:var(--tf);font-weight:600}

/* ── CARD ── */
.card{
  background:var(--cb);
  border:1px solid var(--bd);
  border-radius:var(--r);
  padding:.75rem .95rem;
  margin-bottom:.45rem;
  box-shadow:var(--shadow);
  transition:border-color .15s,box-shadow .15s;
}
.card:hover{border-color:var(--pu2);box-shadow:0 3px 12px rgba(107,63,160,.14)}
.card.hidden{display:none}
.card-live{
  border-color:var(--livebrd)!important;
  background:var(--livebg)!important;
  box-shadow:0 0 0 2px rgba(220,38,38,.08)!important;
}

.card-top{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:.55rem;
}
.cleft{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;min-width:0}
.dtag{
  font-size:10px;font-weight:700;
  background:var(--pu3);color:var(--pu);
  padding:2px 7px;border-radius:4px;
  white-space:nowrap;max-width:200px;
  overflow:hidden;text-overflow:ellipsis;
  letter-spacing:.02em;text-transform:uppercase;
}
.rlbl{font-size:11px;color:var(--tf);font-weight:500}

.badge{
  font-size:10px;font-weight:700;
  padding:2px 9px;border-radius:20px;
  white-space:nowrap;flex-shrink:0;
  letter-spacing:.03em;text-transform:uppercase;
}
.b-live{background:#DC2626;color:#fff;animation:pulse 1.5s infinite}
.b-win{background:var(--wbg);color:var(--wtx)}
.b-loss{background:var(--lbg);color:var(--ltx)}
.b-draw{background:var(--dbg);color:var(--dtx)}
.b-up{background:var(--ubg);color:var(--utx)}

/* ── MATCHUP — 3-column ── */
.matchup{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;gap:.45rem;
}
.team-block{display:flex;flex-direction:column;gap:3px}
.team-block-right{align-items:flex-end;text-align:right}
.team{font-size:14px;font-weight:600;color:var(--tm);line-height:1.25}
.tt{color:var(--pu);font-weight:700}

/* ── RANK BADGE (under team name) ── */
.rank-badge{
  display:inline-block;font-size:10px;font-weight:700;
  padding:1px 6px;border-radius:8px;
  letter-spacing:.02em;white-space:nowrap;
}
.rk-1{background:#FEF9C3;color:#854D0E;border:1px solid #FDE047}
.rk-2{background:#F1F5F9;color:#475569;border:1px solid #CBD5E1}
.rk-3{background:#FEF3C7;color:#92400E;border:1px solid #FCD34D}
.rk-top{background:var(--pu3);color:var(--pu);border:1px solid var(--pu2)}
.rk-low{background:#F5F5F5;color:#888;border:1px solid #DDD}

/* ── SCORE ── */
.score{
  font-size:1.4rem;font-weight:800;color:var(--dark);
  text-align:center;white-space:nowrap;
  display:flex;align-items:center;justify-content:center;gap:2px;
  font-variant-numeric:tabular-nums;
}
.score-live{color:#DC2626}
.dash{color:var(--tf);font-weight:300;font-size:1rem;margin:0 1px}
.vs{font-size:11px;font-weight:600;color:var(--tf);text-align:center;letter-spacing:.05em}
.ldot{
  display:inline-block;width:7px;height:7px;
  background:#DC2626;border-radius:50%;flex-shrink:0;
  animation:ldotPulse 1s infinite;
}
@keyframes ldotPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.5}}

/* ── CARD FOOTER — court only ── */
.cfoot{
  margin-top:.5rem;
  font-size:11px;color:var(--tf);
  display:flex;align-items:center;gap:.5rem;
}
.court-tag{
  background:var(--pu4);color:var(--pu2);
  border:1px solid var(--bd);
  padding:1px 7px;border-radius:4px;
  font-size:10px;font-weight:600;letter-spacing:.03em;
}
.time-tag{color:var(--tf)}

/* ── EMPTY ── */
.empty{
  text-align:center;padding:2.5rem 1rem;
  background:var(--cb);border:1px dashed var(--bd);
  border-radius:var(--r);color:var(--tm);font-size:14px;
}

/* ── SETUP NOTICE ── */
.setup-notice{
  background:#FEF9C3;border:1px solid #FDE047;
  border-radius:var(--r);padding:.9rem 1rem;
  margin-bottom:.9rem;font-size:12px;line-height:1.6;
}
.setup-notice strong{color:#854D0E;display:block;margin-bottom:.3rem;font-size:13px}
.setup-notice code{background:rgba(0,0,0,.07);padding:1px 5px;border-radius:3px;font-size:11px}

/* ── FOOTER ── */
.page-footer{
  background:var(--dark);
  text-align:center;padding:.9rem;
  font-size:11px;color:rgba(255,255,255,.4);
}
.page-footer a{color:rgba(255,255,255,.5);text-decoration:none}
.page-footer a:hover{color:#fff}
div#today-empty {display: none;}

@media(max-width:480px){
  .team{font-size:13px}
  .score{font-size:1.2rem}
  .dtag{max-width:140px}
  .rank-badge{font-size:9px}
  .page-header{padding:1.25rem 1rem 0}
}
</style>
</head>

</div>

<!-- SCHEDULE PANEL -->
<div class="panel" id="panel-schedule">
  <div class="filters-wrap">

    </div>
    <div class="frow" id="sched-team-btns"></div>
  </div>
  <main>
    <div class="rcnt" id="sched-count"></div>
    <div id="sched-list"></div>
    <div class="empty hidden" id="sched-empty">No matches found.</div>
  </main>
</div>

<div class="page-footer">

</div>

// ── Helpers ───────────────────────────────────────────────────
function isTrinity(n){ return typeof n==='string' && n.toLowerCase().includes('trinity'); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function isGameDay(){
  const aest = new Date(Date.now() + 10*3600_000);
  return aest.getUTCDay()===6 && aest.getUTCHours()>=8 && aest.getUTCHours()<18;
}

function autoRefreshInterval(){
  return isGameDay() ? 2*60_000 : 6*3600_000;
}

function scheduleAuto(){
  clearInterval(autoTimer);
  if (!PROXY_URL) return;
  autoTimer = setInterval(() => fetchFixtures(), autoRefreshInterval());
}

// ── Match Day date resolution ────────────────────────────────
// Matches are played on Saturdays. From Wednesday onward we switch the
// Match Day tab over to previewing the *next* round, and keep showing
// that same round's matches all the way through the following Tuesday.
const MELB_TZ = 'Australia/Melbourne';

function melbourneYMD(){
  const parts = new Intl.DateTimeFormat('en-CA', {
    timeZone: MELB_TZ, year:'numeric', month:'2-digit', day:'2-digit'
  }).formatToParts(new Date());
  const get = t => +parts.find(p=>p.type===t).value;
  return { y:get('year'), mo:get('month'), d:get('day') };
}

function melbourneDayOfWeek(){
  const wd = new Intl.DateTimeFormat('en-US', { timeZone: MELB_TZ, weekday:'short' }).format(new Date());
  return { Sun:0, Mon:1, Tue:2, Wed:3, Thu:4, Fri:5, Sat:6 }[wd];
}

function addDaysUTC(date, days){
  const nd = new Date(date.getTime());
  nd.setUTCDate(nd.getUTCDate() + days);
  return nd;
}

function formatMelbDateStr(date){
  return date.toLocaleDateString('en-AU', {
    timeZone: MELB_TZ, weekday:'short', day:'numeric', month:'short', year:'numeric'
  });
}

// Returns the date_str (matching enrichMatch's format) of the round that
// should be shown on the Match Day tab right now.
function computeMatchDayTargetStr(){
  const { y, mo, d } = melbourneYMD();
  const anchor = new Date(Date.UTC(y, mo-1, d, 12, 0, 0)); // UTC-noon, safely inside the Melbourne calendar day
  const dow = melbourneDayOfWeek(); // 0=Sun ... 6=Sat
  // Wed/Thu/Fri look forward to this week's Saturday; Sat stays; Sun/Mon/Tue look back to last Saturday.
  const offsetToSat = { 0:-1, 1:-2, 2:-3, 3:3, 4:2, 5:1, 6:0 }[dow];
  return formatMelbDateStr(addDaysUTC(anchor, offsetToSat));
}

function resolveMatchDayDate(dateOrder, firstStartByDate){
  if (!dateOrder.length) return '';
  const target = computeMatchDayTargetStr();
  if (dateOrder.includes(target)) return target;
  // No matches on the exact target date (e.g. bye week) — fall back to
  // whichever available date is chronologically closest to it.
  const { y, mo, d } = melbourneYMD();
  const anchor = new Date(Date.UTC(y, mo-1, d, 12, 0, 0));
  const dow = melbourneDayOfWeek();
  const offsetToSat = { 0:-1, 1:-2, 2:-3, 3:3, 4:2, 5:1, 6:0 }[dow];
  const targetTime = addDaysUTC(anchor, offsetToSat).getTime();
  let best = dateOrder[0], bestDiff = Infinity;
  for (const dt of dateOrder){
    const diff = Math.abs(new Date(firstStartByDate[dt]).getTime() - targetTime);
    if (diff < bestDiff){ bestDiff = diff; best = dt; }
  }
  return best;
}

function formatLastUpdated(iso){
  if (!iso) return '';
  const dt = new Date(iso);
  if (isNaN(dt)) return '';
  const datePart = dt.toLocaleDateString('en-AU', { timeZone: MELB_TZ, day:'numeric', month:'short' });
  const timePart = dt.toLocaleTimeString('en-AU', { timeZone: MELB_TZ, hour:'numeric', minute:'2-digit', hour12:true });
  return `Updated ${datePart}, ${timePart}`;
}

// Sets allMatches / allTeams / DATE_ORDER / TODAY_DATE from a flat matches array.
function processMatches(matches){
  allMatches = matches.slice().sort((a,b) => sortKey(a).localeCompare(sortKey(b)));

  allTeams = [
    ...new Set(matches.map(m => isTrinity(m.team1) ? m.team1 : m.team2))
  ].sort();

  const firstStartByDate = {};
  for (const m of matches){
    if (!(m.date_str in firstStartByDate) || m.start < firstStartByDate[m.date_str]){
      firstStartByDate[m.date_str] = m.start;
    }
  }
  DATE_ORDER = Object.keys(firstStartByDate)
    .sort((a,b) => firstStartByDate[a].localeCompare(firstStartByDate[b]));

  TODAY_DATE = resolveMatchDayDate(DATE_ORDER, firstStartByDate);
}

// ── Fetch ─────────────────────────────────────────────────────
async function fetchAll() {
  const [fixtures, ladder] = await Promise.all([
    fetch('./fixtures.json').then(r => r.json()),
    fetch('./ladder.json').then(r => r.json())
  ]);
  
  applyFixtures(fixtures.data);
  applyLadder(ladder.data);

  const lu = formatLastUpdated(fixtures.fetchedAt);
  document.getElementById('last-updated').textContent = lu ? `· ${lu}` : '';

  setStatus('Loaded', false, true);
}

async function fetchFixtures(){
  if (!PROXY_URL) return;
  setStatus('Refreshing scores…', true);
  try {
    const res = await fetch(`${PROXY_URL}/fixtures`);
    if (!res.ok) throw new Error(res.status);
    applyFixtures(await res.json());
    setStatus(`Scores updated ${new Date().toLocaleTimeString('en-AU')}`, false, true);
    scheduleAuto(); // reset timer after manual
  } catch(e){ setStatus(`Scores fetch failed — ${e.message}`, false, false); }
}

async function fetchLadder(){
  if (!PROXY_URL) return;
  setStatus('Refreshing ladder…', true);
  try {
    // First invalidate ladder cache on server so it re-fetches from Squadi
    await fetch(`${PROXY_URL}/admin/invalidate?target=ladder`, {method:'POST'});
    const res = await fetch(`${PROXY_URL}/ladder`);
    if (!res.ok) throw new Error(res.status);
    applyLadder(await res.json());
    setStatus(`Ladder updated ${new Date().toLocaleTimeString('en-AU')}`, false, true);
  } catch(e){ setStatus(`Ladder fetch failed — ${e.message}`, false, false); }
}

// Manual refresh button — also invalidates server cache
async function manualRefresh() {
  location.reload();
}

function applyFixtures(fixtureData){

  console.log('FIXTURES DATA', fixtureData);

    const matches = [];

    for (const round of (fixtureData.rounds || [])) {

      for (const m of (round.matches || [])) {

            const team1 =
              m.team1?.name || '';

            const team2 =
              m.team2?.name || '';

            if (
              !isTrinity(team1) &&
              !isTrinity(team2)
            ) {
              continue;
            }

            matches.push(enrichMatch(m, round));
          }
    }

    console.log('Matches loaded:', matches.length);

    processMatches(matches);

  buildTeamFilters(allTeams);

  renderAll(allMatches, ladderMap);
}

  const lm = {};
  for (const e of entries){
    const id = parseInt(e.id);
    if (!id) continue;
    lm[id] = {
      rank: parseInt(e.rk),
      totalTeams: divCounts[e.divisionId] || 1,
      wins: e.W,
      losses: e.L,
      points: e.PTS
    };
  }

  ladderMap = lm;
  renderAll(allMatches.length ? allMatches : BAKED_MATCHES, ladderMap);
}

// ── Enrich match ──────────────────────────────────────────────
function enrichMatch(m, round) {

  const iso = m.start || m.startTime || '';

  const dt = iso ? new Date(iso) : null;

  const dateStr = dt
    ? dt.toLocaleDateString('en-AU', {
        timeZone: 'Australia/Melbourne',
        weekday: 'short',
        day: 'numeric',
        month: 'short',
        year: 'numeric'
      })
    : '';

  const timeStr = dt
    ? dt.toLocaleTimeString('en-AU', {
        timeZone: 'Australia/Melbourne',
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
      })
    : '';

  const t1 = m.team1?.name || m.team1 || '';
  const t2 = m.team2?.name || m.team2 || '';

  const t1Id = m.team1?.id || m.team1Id || null;
  const t2Id = m.team2?.id || m.team2Id || null;

  const status = m.matchStatus || '';

  const t1s = m.team1Score ?? 0;
  const t2s = m.team2Score ?? 0;

  const t1t = isTrinity(t1);

  let result;

  if (status === 'STARTED') {
    result = 'LIVE';
  } else if (status === 'ENDED') {
    const ts = t1t ? t1s : t2s;
    const os = t1t ? t2s : t1s;

    result =
      ts > os ? 'WIN'
      : ts < os ? 'LOSS'
      : 'DRAW';
  } else {
    result = 'UPCOMING';
  }

  const divName =
    m.division ||
    round?.division?.name ||
    m.divisionName ||
    '';

  const divShort = divName
    .replace(/\(Femals and Males\)|\(Females & Males\)/g, '')
    .replace(/\(Males 13\/U.*?participate\)/g, '')
    .replace(/restrictions apply|- no restrictions/g, '')
    .replace(/\s+/g, ' ')
    .trim();

  const courtRaw =
    m.venueCourt?.name ||
    m.court ||
    '';

  const courtNum =
    courtRaw.replace(/Court\s*/i, '');

  const courtLabel =
    courtNum
      ? `Court ${courtNum}`
      : courtRaw;

  return {
    id: m.id,
    round: round?.name || m.round || '',
    div_short: divShort,
    start: iso,
    date_str: dateStr,
    time_str: timeStr,
    team1: t1,
    team2: t2,
    team1Id: t1Id,
    team2Id: t2Id,
    team1Score: t1s,
    team2Score: t2s,
    matchStatus: status,
    result,
    court: courtLabel
  };
}


    function sortKey(m){
  const o={LIVE:0,WIN:1,LOSS:1,DRAW:1,UPCOMING:2};
  return `${o[m.result]??2}|${m.start}`;
}

// ── Render ────────────────────────────────────────────────────
// Age groups, in display order. Anything unrecognised falls in "Other".
const AGE_GROUP_ORDER = ['U11','U13','U15','U17','Open','Other'];

function ageGroup(m){
  const src = m.div_short || '';
  const num = src.match(/(\d+)\s*&\s*U/i);
  if (num) return 'U' + num[1];
  if (/open/i.test(src)) return 'Open';
  return 'Other';
}

// Groups a list of matches by age group (in AGE_GROUP_ORDER) and renders
// each group with its own header, cards sorted LIVE-first then by time.
function renderCardsByAgeGroup(matches, lmap){
  const groups = {};
  for (const m of matches){
    const ag = ageGroup(m);
    (groups[ag] = groups[ag] || []).push(m);
  }
  const order = [
    ...AGE_GROUP_ORDER.filter(ag => groups[ag]),
    ...Object.keys(groups).filter(ag => !AGE_GROUP_ORDER.includes(ag))
  ];

  return order.map(ag => {
    const list = groups[ag].slice().sort((a,b)=>sortKey(a).localeCompare(sortKey(b)));
    return `<div class="agegrp" data-age="${esc(ag)}">
      <div class="agehead">
        <span class="albl">${esc(ag)}</span>
        <span class="acnt">${list.length} match${list.length!==1?'es':''}</span>
      </div>
      ${list.map(m=>makeCard(m,lmap)).join('')}
    </div>`;
  }).join('');
}

function renderAll(matches, lmap){
  const today     = matches.filter(m=>m.date_str===TODAY_DATE);
  const todayLive = today.filter(m=>m.result==='LIVE').length;
  const todayWins = today.filter(m=>m.result==='WIN').length;
  const todayLoss = today.filter(m=>m.result==='LOSS').length;
  const todayRem  = today.filter(m=>m.result==='UPCOMING').length;

  document.getElementById('stat-live').textContent     = todayLive;
  document.getElementById('stat-played').textContent   = todayWins+todayLoss;
  document.getElementById('stat-upcoming').textContent = todayRem;

  document.getElementById('today-chips').innerHTML = [
    todayLive ? `<span class="chip chip-live">● ${todayLive} Live</span>` : '',
    `<span class="chip chip-win">${todayWins} Win${todayWins!==1?'s':''}</span>`,
    `<span class="chip chip-loss">${todayLoss} Loss${todayLoss!==1?'es':''}</span>`,
    `<span class="chip chip-rem">${todayRem} Upcoming</span>`,
  ].join('');

  // Match Day header — round + date being shown
  const todayDateEl = document.getElementById('today-date');
  if (todayDateEl){
    todayDateEl.textContent = today.length
      ? `${today[0].round}${today[0].round?' · ':''}${TODAY_DATE}`
      : (TODAY_DATE || 'No matches scheduled');
  }

  // Today cards — grouped by age group, LIVE first then by start time within each group
  document.getElementById('today-cards').innerHTML = renderCardsByAgeGroup(today, lmap);

  // Schedule sections — one per date, each split into age groups
  let shtml='';
  for (const date of DATE_ORDER){
    const day = matches.filter(m=>m.date_str===date);
    if (!day.length) continue;
    const isToday = date===TODAY_DATE;
    shtml+=`<section class="dsec" data-date="${esc(date)}">
      <div class="dhead">
        <span class="dlbl">${isToday?'🔴 Match Day — ':''}${esc(date)}</span>
        <span class="dcnt">${day.length} match${day.length!==1?'es':''}</span>
      </div>
      ${renderCardsByAgeGroup(day, lmap)}
    </section>`;
  }
  document.getElementById('sched-list').innerHTML = shtml;

  applyTodayFilter();
  applySchedFilter();
}

function makeCard(m, lmap){
  const t1t  = isTrinity(m.team1);
  const t2t  = isTrinity(m.team2);
  const live = m.result==='LIVE';
  const done = ['WIN','LOSS','DRAW'].includes(m.result);
  const hasScore = (live||done) && (m.team1Score||m.team2Score||done);

const t1RankNum = lmap[m.team1Id]?.rank;
const t2RankNum = lmap[m.team2Id]?.rank;

function ordinal(n){
  if (!n) return '?';

  const suffix =
    [11,12,13].includes(n % 100)
      ? 'th'
      : ({1:'st',2:'nd',3:'rd'}[n % 10] || 'th');

  return `${n}${suffix}`;
}

const showLadderPreview =
  !hasScore &&
  m.date_str === TODAY_DATE;

  const scoreHtml = hasScore
  ? `<div class="score ${live ? 'score-live' : ''}">
      ${live ? '<span class="ldot"></span>' : ''}
      <span>${m.team1Score}</span>
      <span class="dash">–</span>
      <span>${m.team2Score}</span>
     </div>`
  : showLadderPreview
    ? `<div class="vs">
         ${ordinal(t1RankNum)}
         <span class="dash">v</span>
         ${ordinal(t2RankNum)}
       </div>`
    : `<div class="vs">vs</div>`;


  const bmap={LIVE:'b-live ● LIVE',WIN:'b-win Win',LOSS:'b-loss Loss',DRAW:'b-draw Draw',UPCOMING:'b-up Upcoming'};
  const [bcls,...bw]=(bmap[m.result]||'b-up Upcoming').split(' ');

  const teamKey = esc(t1t?m.team1:m.team2);
  const t1Rank  = rankBadge(m.team1Id, lmap);
  const t2Rank  = rankBadge(m.team2Id, lmap);

  // Footer: time + court only (no venue name — always Maroondah Nets on Saturday)
  const footHtml = [
    m.time_str ? `<span class="time-tag">🕐 ${esc(m.time_str)}</span>` : '',
    m.court    ? `<span class="court-tag">${esc(m.court)}</span>`      : '',
  ].filter(Boolean).join('');

  return `<div class="card${live?' card-live':''}" data-team="${teamKey}" data-result="${m.result}" data-round="${esc(m.round)}">
    <div class="card-top">
      <div class="cleft"><span class="dtag">${esc(m.div_short)}</span><span class="rlbl">${esc(m.round)}</span></div>
      <span class="badge ${bcls}">${bw.join(' ')}</span>
    </div>
    <div class="matchup">
      <div class="team-block">
        <div class="team ${t1t?'tt':''}">${esc(m.team1)}</div>
      </div>
      ${scoreHtml}
      <div class="team-block team-block-right">
        <div class="team ${t2t?'tt':''}">${esc(m.team2)}</div>        
      </div>
    </div>
    ${footHtml?`<div class="cfoot">${footHtml}</div>`:''}
  </div>`;
}

function rankBadge(teamId, lmap){
  if (!teamId||!lmap[teamId]) return '';
  const {rank,totalTeams,wins,losses,points} = lmap[teamId];
  const n=parseInt(rank);
  const sfx=[11,12,13].includes(n%100)?'th':({1:'st',2:'nd',3:'rd'}[n%10]||'th');
  const cls=n===1?'rk-1':n===2?'rk-2':n===3?'rk-3':n<=Math.ceil(totalTeams/2)?'rk-top':'rk-low';
  return `<span class="rank-badge ${cls}" title="${wins}W ${losses}L · ${points}pts">${n}${sfx} of ${totalTeams}</span>`;
}

// ── Filters ───────────────────────────────────────────────────
function applyTodayFilter(){
  let v=0;
  document.querySelectorAll('#today-cards .card').forEach(c=>{
    const ok=(todayResultFilter==='all'||c.dataset.result===todayResultFilter)
           &&(todayTeamFilter==='all'||c.dataset.team===todayTeamFilter);
    c.classList.toggle('hidden',!ok); if(ok)v++;
  });
  document.querySelectorAll('#today-cards .agegrp').forEach(g=>{
    g.classList.toggle('hidden', g.querySelectorAll('.card:not(.hidden)').length===0);
  });
  document.getElementById('today-count').textContent=`Showing ${v} match${v!==1?'es':''}`;
  document.getElementById('today-empty').classList.toggle('hidden',v>0);
}

function applySchedFilter(){
  let v=0;
  document.querySelectorAll('#sched-list .card').forEach(c=>{
    const ok=(schedResultFilter==='all'||c.dataset.result===schedResultFilter||c.dataset.round===schedResultFilter)
           &&(schedTeamFilter==='all'||c.dataset.team===schedTeamFilter);
    c.classList.toggle('hidden',!ok); if(ok)v++;
  });
  document.querySelectorAll('#sched-list .agegrp').forEach(g=>{
    g.classList.toggle('hidden', g.querySelectorAll('.card:not(.hidden)').length===0);
  });
  document.querySelectorAll('#sched-list .dsec').forEach(s=>{
    s.style.display=s.querySelectorAll('.card:not(.hidden)').length?'':'none';
  });
  document.getElementById('sched-count').textContent=`Showing ${v} match${v!==1?'es':''}`;
  document.getElementById('sched-empty').classList.toggle('hidden',v>0);
}

function buildTeamFilters(teams){
  const mk=(t,sfx)=>`<button class="tbtn tt-${sfx}${t==='all'?' active':''}" data-team="${esc(t)}">${esc(t==='all'?'All teams':t.replace('Trinity ',''))}</button>`;
  document.getElementById('today-team-btns').innerHTML=['all',...teams].map(t=>mk(t,'today')).join('');
  document.getElementById('sched-team-btns').innerHTML=['all',...teams].map(t=>mk(t,'sched')).join('');
  bindTeamBtns();
}

function bindTeamBtns(){
  document.querySelectorAll('.tt-today').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('.tt-today').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');todayTeamFilter=b.dataset.team;applyTodayFilter();
  }));
  document.querySelectorAll('.tt-sched').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('.tt-sched').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');schedTeamFilter=b.dataset.team;applySchedFilter();
  }));
}

// ── Tabs ──────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  document.getElementById('panel-'+t.dataset.tab).classList.add('active');
}));

document.querySelectorAll('.tf-btn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.tf-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');todayResultFilter=b.dataset.tfilter;applyTodayFilter();
}));
document.querySelectorAll('.sf-btn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.sf-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');schedResultFilter=b.dataset.sfilter;applySchedFilter();
}));

// ── Status ────────────────────────────────────────────────────
function setStatus(msg, loading, ok){
  document.getElementById('status-text').textContent = msg;
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot' + (loading ? '' : ok ? ' live' : '');
}

function showSetupNotice(){
  if (document.getElementById('setup-notice')) return;
  const el = document.createElement('div');
  el.id = 'setup-notice';
  el.className = 'setup-notice';
  el.innerHTML = `<strong>⚙️ Live data not configured</strong>
    Deploy the proxy to Cloud Run, then set <code>const PROXY_URL = 'https://...'</code> at the top of this file.
    Currently showing cached data from last round.`;
  document.querySelector('#panel-today main').prepend(el);
}
